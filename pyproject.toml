[project]
name = "wanderai"
version = "0.1.0"
description = "Scene-agnostic egocentric object-search RL environment"
requires-python = ">=3.11,<3.13"
dependencies = [
    "numpy",
    "hud-python>=0.5.41",
    "fastmcp>=3.0,<4",
]

[project.optional-dependencies]
dev = ["pytest"]

[tool.setuptools.packages.find]
include = ["wanderai*"]
